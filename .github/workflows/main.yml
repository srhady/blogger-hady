name: Auto Run Fancode Formatter

on:
  schedule:
    - cron: '0 */6 * * *' # প্রতি ৬ ঘণ্টা পর পর কোডটি রান করবে। আপনি চাইলে সময় পরিবর্তন করতে পারেন।
  workflow_dispatch: # রিপোজিটরির Actions ট্যাব থেকে ম্যানুয়ালি রান করার জন্য।

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write # অটো-কমিট করার জন্য পারমিশন

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Python Script
        run: python fancode_formatter.py

      - name: Commit and Push output
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output.json
          git commit -m "Auto-update live matches data" || echo "No changes to commit"
          git push
